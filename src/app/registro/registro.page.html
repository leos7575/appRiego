<ion-content [fullscreen]="true" class="desktop-bg">
  <div class="login-wrapper">
    
    <div class="split-card">
      
      <div class="split-left">
        <div class="brand-container">
          <h2 class="brand-title">Aqua Control</h2>
          <p class="brand-subtitle">Smart monitoring & optimization</p>
        </div>
        
        <div class="illustration-container">
          </div>
      </div>

      <div class="split-right">
        <h1 class="main-title">Create Account</h1>

        <div class="input-group">
          <label>Username</label>
          <ion-input
            [(ngModel)]="credenciales.usuario"
            name="username"
            placeholder="Choose a username"
            type="text"
            required
            class="premium-input"
          ></ion-input>
          <p *ngIf="errores.usuario" class="error-text">{{ errores.usuario }}</p>
        </div>

        <div class="input-group">
          <label>Email</label>
          <ion-input
            [(ngModel)]="credenciales.email"
            name="email"
            placeholder="Enter your email"
            type="email"
            required
            class="premium-input"
          ></ion-input>
          <p *ngIf="errores.email" class="error-text">{{ errores.email }}</p>
        </div>

        <div class="input-group">
          <label>Password</label>
          <ion-input
            [(ngModel)]="credenciales.password"
            name="password"
            placeholder="Create a password"
            type="password"
            required
            class="premium-input"
          >
            <ion-input-password-toggle slot="end" class="light-eye"></ion-input-password-toggle>
          </ion-input>
          <p *ngIf="errores.password" class="error-text">{{ errores.password }}</p>
        </div>

        <ion-button (click)="insertar()" fill="solid" expand="block" class="neon-btn">
          REGISTER
        </ion-button>

        <div class="forgot-container">
          <span class="text-secondary">I already have an account.</span>
          <a href="login" class="neon-link">Login here</a>
        </div>

      </div>

    </div>
  </div>
</ion-content>
