<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Premium Font: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<ion-content [fullscreen]="true" class="dark-background">
  <div class="centered-container">
    <ion-card class="premium-card">
      
      <ion-card-header class="clean-header">
        <!-- Text-based title replacing the logo with a sleek gradient -->
        <h1 class="main-title">Aqua Control</h1>
        <p class="dark-subtitle">Smart monitoring & optimization</p>
      </ion-card-header>

      <ion-card-content>
        <!-- Username Input -->
        <ion-input
          [(ngModel)]="usuariosCredes.usuario"
          name="username"
          placeholder="Username"
          type="text"
          required
          minlength="3"
          email
          #usuario="ngModel" 
          class="premium-input"
        ></ion-input>

        <!-- Password Input -->
        <ion-input
          [(ngModel)]="usuariosCredes.password"
          name="password"
          placeholder="Password"
          type="password"
          required
          minlength="6"
          #password="ngModel"
          class="premium-input"
        >
          <ion-input-password-toggle slot="end" class="neon-eye"></ion-input-password-toggle>
        </ion-input>
      </ion-card-content>

      <ion-button (click)="mostrar()" fill="solid" expand="block" class="neon-btn">
        Log In
      </ion-button>

      <div class="forgot-container">
        <span class="text-secondary">Don’t have an account?</span>
        <a href="registro" class="neon-link">Request Now</a>
      </div>
      
    </ion-card>
  </div>
</ion-content>
